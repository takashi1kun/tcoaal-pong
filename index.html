<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Renee Pong</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

canvas{
    background:black;
    border:3px solid white;
}
</style>

</head>
<body>

<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const ballImg=new Image();
ballImg.src="ball.png";

const p1Img=new Image();
p1Img.src="paddle1.png";

const p2Img=new Image();
p2Img.src="paddle2.png";

const paddleWidth=49;
const paddleHeight=82;

const ball={
    x:canvas.width/2,
    y:canvas.height/2,
    w:47,
    h:55,
    vx:5*(Math.random()<0.5?-1:1),
    vy:3,
    angle:0,
    angularVelocity:0
};

const left={
    x:20,
    y:canvas.height/2-paddleHeight/2,
    score:0
};

const right={
    x:canvas.width-20-paddleWidth,
    y:canvas.height/2-paddleHeight/2,
    score:0
};

const keys={};

//====================
// PAINT CONFIGURATION
//====================

const PAINT = {

enabled: true,

colorMode: "solid", // "solid" or "rainbow"

color: "#880808",

hue: 0,            // Used if rainbow

saturation: 95,

lightness: 60,

opacity: 0.55,

size: 8,

randomness: -1,

life: 600,           // Frames

interval: 1          // Lower = more paint
};

const paintTrail = [];
let paintCounter = 0;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function resetBall(){

    ball.x=canvas.width/2-ball.w/2;
    ball.y=canvas.height/2-ball.h/2;

    ball.vx=2*(Math.random()<0.5?-1:1);
    ball.vy=(Math.random()*2)-3;
    const speed=Math.hypot(ball.vx,ball.vy);

const MAX_SPEED=5;

if(speed>MAX_SPEED){

    ball.vx*=MAX_SPEED/speed;
    ball.vy*=MAX_SPEED/speed;

}

}
function spawnPaint(){

if(!PAINT.enabled) return;

paintCounter++;

if(paintCounter % PAINT.interval !== 0)
    return;

paintTrail.push({

    x: ball.x + ball.w/2 + (Math.random()-0.5)*PAINT.randomness,

    y: ball.y + ball.h/2 + (Math.random()-0.5)*PAINT.randomness,

    radius: PAINT.size * (0.7 + Math.random()*0.6),

    rotation: Math.random()*Math.PI*2,

    life: PAINT.life

});

}


function updatePaint(){

spawnPaint();

for(let i=paintTrail.length-1;i>=0;i--){

    paintTrail[i].life--;

    if(paintTrail[i].life<=0)
        paintTrail.splice(i,1);

}

}

function drawPaint(){

for(const p of paintTrail){

    const alpha=(p.life/PAINT.life)*PAINT.opacity;

    let fill;

    if(PAINT.colorMode==="rainbow"){

        const hue=(PAINT.hue+p.life)%360;

        fill=`hsla(${hue},
                    ${PAINT.saturation}%,
                    ${PAINT.lightness}%,
                    ${alpha})`;

    }else{

        fill=PAINT.color;

    }

    ctx.save();

    ctx.translate(p.x,p.y);

    ctx.rotate(p.rotation);

    ctx.globalAlpha=alpha;

    ctx.fillStyle=fill;

    ctx.beginPath();

const points = 14;

for(let i=0;i<points;i++){

    const angle=(Math.PI*2/points)*i;

    let radius=p.radius*(0.75+0.5*0.45);

    // Occasionally create a drip

    const x=Math.cos(angle)*radius;
    const y=Math.sin(angle)*radius;

    if(i===0)
        ctx.moveTo(x,y);
    else
        ctx.lineTo(x,y);
}

    ctx.closePath();

    ctx.fill();
    ctx.globalAlpha*=0.25;

ctx.fillStyle="white";

ctx.beginPath();

ctx.arc(
    -p.radius*0.2,
    -p.radius*0.2,
    p.radius*0.3,
    0,
    Math.PI*2
);

ctx.fill();
    ctx.restore();

}

ctx.globalAlpha=1;

}

function update(){

    // Player movement

    if(keys["w"]||keys["W"])
        left.y-=6;

    if(keys["s"]||keys["S"])
        left.y+=6;

    if(keys["ArrowUp"])
        right.y-=6;

    if(keys["ArrowDown"])
        right.y+=6;

    left.y=Math.max(0,Math.min(canvas.height-paddleHeight,left.y));
    right.y=Math.max(0,Math.min(canvas.height-paddleHeight,right.y));

    // Ball movement

    ball.x+=ball.vx;
    ball.y+=ball.vy;

    if(ball.y<=0||ball.y+ball.h>=canvas.height)
        ball.vy*=-1;

    // Left paddle collision

    if(ball.x<left.x+paddleWidth &&
       ball.x+ball.w>left.x &&
       ball.y<left.y+paddleHeight &&
       ball.y+ball.h>left.y){

        ball.x=left.x+paddleWidth;
        ball.vx=Math.abs(ball.vx);

        let hit=(ball.y+ball.h/2)-(left.y+paddleHeight/2);
        ball.vy=hit*0.12;
        ball.angularVelocity += hit * 0.004;
    }

    // Right paddle collision

    if(ball.x+ball.w>right.x &&
       ball.x<right.x+paddleWidth &&
       ball.y<right.y+paddleHeight &&
       ball.y+ball.h>right.y){

        ball.x=right.x-ball.w;
        ball.vx=-Math.abs(ball.vx);

        let hit=(ball.y+ball.h/2)-(right.y+paddleHeight/2);
        ball.vy=hit*0.12;
        ball.angularVelocity += hit * 0.004;
    }

    // Score
    ball.angle += ball.angularVelocity;
    if(ball.x<0){
        right.score++;
        resetBall();
    }

    if(ball.x>canvas.width){
        left.score++;
        resetBall();
    }

}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawPaint();
    // Center line

    ctx.strokeStyle="#555";
    ctx.setLineDash([10,10]);

    ctx.beginPath();
    ctx.moveTo(canvas.width/2,0);
    ctx.lineTo(canvas.width/2,canvas.height);
    ctx.stroke();

    ctx.setLineDash([]);

    // Draw sprites

    ctx.drawImage(
        p1Img,
        left.x,
        left.y,
        paddleWidth,
        paddleHeight
    );

    ctx.drawImage(
        p2Img,
        right.x,
        right.y,
        paddleWidth,
        paddleHeight
    );

    ctx.save();

ctx.translate(
    ball.x + ball.w/2,
    ball.y + ball.h/2
);

ctx.rotate(ball.angle);

ctx.drawImage(
    ballImg,
    -ball.w/2,
    -ball.h/2,
    ball.w,
    ball.h
);

ctx.restore();

    // Scores

    ctx.fillStyle="white";
    ctx.font="40px Arial";

    ctx.fillText(left.score,canvas.width/4,50);
    ctx.fillText(right.score,canvas.width*3/4,50);

}

function gameLoop(){

    update();
updatePaint();
draw();

    requestAnimationFrame(gameLoop);
    ball.angularVelocity *= 0.985;
    ball.vx *= 0.998;
ball.vy *= 0.998;
const MIN_SPEED = 2.8;

const speed = Math.hypot(ball.vx, ball.vy);

if(speed < MIN_SPEED){

    ball.vx *= MIN_SPEED/speed;
    ball.vy *= MIN_SPEED/speed;

}
}

gameLoop();

</script>

</body>
</html>
